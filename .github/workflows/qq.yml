# QQ 每日自动任务 - GitHub Actions 工作流
# 每天北京时间 07:00 自动执行（UTC 23:00）
# 支持手动触发
 
name: QQ Daily Task
 
on:
  schedule:
    # UTC 23:00 = 北京时间 07:00
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制执行'
        required: false
        default: 'true'
 
jobs:
  qq-daily:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Run QQ Daily Task
        env:
          QQ_COOKIE: 'RK=pMDq/p6ARQ; ptcz=3290f2e1e5aff15a4cc873650299d46ff20427b75834bba1ed00d42560cbd8c3; _clck=tzpjal|1|g7j|0; pgv_info=ssid=s1559662090; pgv_pvid=1045185503; uin=o0547152849; skey=@muphZy6Al; p_uin=o0547152849; pt4_token=Mz8kSfQ-G8eFDtDUsgXtVLO7FT3Mlhj1wT82NO0IwYo_; p_skey=dUcE6*dSrkq*cXUk1y3WRycq0AHh2WnOXj8I*i*n5Kw_; Loading=Yes; media_p_uin=547152849; qqmusic_uin=; qqmusic_key=; qqmusic_fromtag=; __Q_w_s_hat_seed=1; qzmusicplayer=qzone_player_547152849_1783491177804; v6uin=547152849|qzone_player; media_p_skey=8JgqobheYugbKRq77LBN85zoZN0tT20J-RhPuQ3XSrstZvH8khg6uO0yVnOGpazZf6TPv6CpqnEaCupjy0ogvQ'
          ENABLE_QQ_MUSIC: ${{ secrets.ENABLE_QQ_MUSIC }}
          ENABLE_QQ_GAME: ${{ secrets.ENABLE_QQ_GAME }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
          PUSH_TYPE: ${{ secrets.PUSH_TYPE }}
        run: python qq_auto.py
 
      - name: Cleanup
        if: always()
        run: echo "Task completed at $(date)"
